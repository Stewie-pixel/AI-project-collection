name: Deploy Single Model

on:
  repository_dispatch:
    types: [deploy-model]
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Name of the model'
        required: true
        default: 'employee-salary-prediction'
      docker_image:
        description: 'Docker image path'
        required: true
        default: 'edwardes/employee-salary-prediction:latest'
      subdomain:
        description: 'Routing subdomain'
        required: true
        default: 'employee-salary'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add model to registry
        run: |
          $model = '${{ github.event.client_payload.model_name || github.event.inputs.model_name }}'
          $image = '${{ github.event.client_payload.docker_image || github.event.inputs.docker_image }}'
          $subdomain = '${{ github.event.client_payload.subdomain || github.event.inputs.subdomain }}'
          $models = Get-Content models.json | ConvertFrom-Json
          $exists = $models | Where-Object { $_.name -eq $model }
          if (-not $exists) {
            powershell -File scripts\add-model.ps1 `
              -ModelName $model `
              -DockerImage $image `
              -Subdomain $subdomain
          } else {
            Write-Host "Model '$model' already registered, skipping add."
          }
        shell: powershell

      - name: Deploy model to cluster
        run: kubectl apply -k "k8s\overlays\${{ github.event.client_payload.model_name || github.event.inputs.model_name }}"
        shell: powershell

      - name: Regenerate and apply ingress
        run: |
          powershell -File scripts\generate-ingress.ps1
          kubectl apply -f k8s\ingress\ingress.yml
        shell: powershell

      - name: Commit updated models.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.CENTRAL_REPO_TOKEN }}@github.com/Stewie-pixel/AI-project-collection.git
          git checkout -b bot/register-${{ github.event.client_payload.model_name || github.event.inputs.model_name }}
          git add models.json k8s/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: register ${{ github.event.client_payload.model_name || github.event.inputs.model_name }}"
            git push origin bot/register-${{ github.event.client_payload.model_name || github.event.inputs.model_name }} --force
          } else {
            Write-Host "Nothing to commit."
          }
        shell: powershell

      - name: Create and merge Pull Request
        run: |
          $branch = "bot/register-${{ github.event.client_payload.model_name || github.event.inputs.model_name }}"
          
          $pr = curl.exe -s -X POST `
            -H "Authorization: token ${{ secrets.CENTRAL_REPO_TOKEN }}" `
            -H "Accept: application/vnd.github.v3+json" `
            https://api.github.com/repos/Stewie-pixel/AI-project-collection/pulls `
            -d "{`"title`":`"chore: register ${{ github.event.client_payload.model_name || github.event.inputs.model_name }}`",`"head`":`"$branch`",`"base`":`"main`",`"body`":`"Automated model registration`"}" | ConvertFrom-Json

          $prNumber = $pr.number
          Write-Host "PR #$prNumber created"

          curl.exe -s -X PUT `
            -H "Authorization: token ${{ secrets.CENTRAL_REPO_TOKEN }}" `
            -H "Accept: application/vnd.github.v3+json" `
            https://api.github.com/repos/Stewie-pixel/AI-project-collection/pulls/$prNumber/merge `
            -d "{`"merge_method`":`"squash`"}"

          Write-Host "PR #$prNumber merged"
        shell: powershell
