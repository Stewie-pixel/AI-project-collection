name: Deploy Single Model

on:
  repository_dispatch:
    types: [deploy-model]
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Name of the model'
        required: true
        default: 'employee-salary-prediction'
      docker_image:
        description: 'Docker image path'
        required: true
        default: 'edwardes/employee-salary-prediction:latest'
      subdomain:
        description: 'Routing subdomain'
        required: true
        default: 'employee-salary'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add model to registry
        run: |
          $model = '${{ github.event.client_payload.model_name }}'
          $image = '${{ github.event.client_payload.docker_image }}'
          $subdomain = '${{ github.event.client_payload.subdomain }}'

          $models = Get-Content models.json | ConvertFrom-Json
          $exists = $models | Where-Object { $_.name -eq $model }

          if (-not $exists) {
            powershell -File scripts\add-model.ps1 `
              -ModelName $model `
              -DockerImage $image `
              -Subdomain $subdomain
          } else {
            Write-Host "Model '$model' already registered, skipping add."
          }
        shell: powershell

      - name: Deploy model to cluster
        run: kubectl apply -k "k8s\overlays\${{ github.event.client_payload.model_name }}"
        shell: powershell

      - name: Regenerate and apply ingress
        run: |
          powershell -File scripts\generate-ingress.ps1
          kubectl apply -f k8s\ingress\ingress.yml
        shell: powershell

      - name: Commit updated models.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models.json k8s/
          git diff --staged --quiet || git commit -m "chore: register ${{ github.event.client_payload.model_name }}"
          git push
        shell: powershell
