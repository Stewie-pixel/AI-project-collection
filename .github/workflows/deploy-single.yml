name: Deploy Single Model

on:
  repository_dispatch:
    types: [deploy-model]
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Repo/folder name'
        required: true
        default: 'employee-salary-prediction'
      docker_image:
        description: 'Docker image path'
        required: true
        default: 'edwardes/employee-salary-prediction:latest'
      subdomain:
        description: 'Routing subdomain'
        required: true
        default: 'employee-salary'
      title:
        description: 'Display name'
        required: true
        default: 'Employee Salary Prediction'
      models:
        description: 'Algorithm(s) used'
        required: true
        default: 'Linear Regression + XGBoost'
      domain:
        description: 'ML domain'
        required: true
        default: 'Regression'
      accuracy:
        description: 'Model accuracy'
        required: false
        default: ''
      tags:
        description: 'Comma separated tags'
        required: false
        default: 'Regression,Tabular'
      github:
        description: 'Child repo URL'
        required: true
        default: 'https://github.com/Stewie-pixel/employee-salary-prediction'
      hf_space:
        description: 'Hugging Face Space URL'
        required: true
        default: 'https://huggingface.co/spaces/Stewie-pixel/employee-salary-prediction'
      status:
        description: 'Model status'
        required: false
        default: 'pending'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add model to registry
        run: |
          $model     = '${{ github.event.client_payload.model_name || github.event.inputs.model_name }}'
          $image     = '${{ github.event.client_payload.docker_image || github.event.inputs.docker_image }}'
          $subdomain = '${{ github.event.client_payload.subdomain || github.event.inputs.subdomain }}'
          $title     = '${{ github.event.client_payload.title || github.event.inputs.title }}'
          $models    = '${{ github.event.client_payload.models || github.event.inputs.models }}'
          $domain    = '${{ github.event.client_payload.domain || github.event.inputs.domain }}'
          $accuracy  = '${{ github.event.client_payload.accuracy || github.event.inputs.accuracy }}'
          $tags      = '${{ github.event.client_payload.tags || github.event.inputs.tags }}'
          $github    = '${{ github.event.client_payload.github || github.event.inputs.github }}'
          $hfSpace   = '${{ github.event.client_payload.hf_space || github.event.inputs.hf_space }}'
          $status    = '${{ github.event.client_payload.status || github.event.inputs.status }}'

          powershell -File scripts\add-model.ps1 `
            -ModelName  $model `
            -DockerImage $image `
            -Subdomain  $subdomain `
            -Title      $title `
            -Models     $models `
            -Domain     $domain `
            -Accuracy   $accuracy `
            -Tags       $tags `
            -Github     $github `
            -HfSpace    $hfSpace `
            -Status     $status
        shell: powershell

      - name: Commit updated models.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.CENTRAL_REPO_TOKEN }}@github.com/Stewie-pixel/AI-project-collection.git
          git checkout -b bot/register-${{ github.event.client_payload.model_name || github.event.inputs.model_name }}
          git add models.json k8s/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: register ${{ github.event.client_payload.model_name || github.event.inputs.model_name }}"
            git push origin bot/register-${{ github.event.client_payload.model_name || github.event.inputs.model_name }} --force
          } else {
            Write-Host "Nothing to commit."
          }
        shell: powershell

      - name: Create and merge Pull Request
        run: |
          $modelName = "${{ github.event.client_payload.model_name || github.event.inputs.model_name }}"
          $branch = "bot/register-$modelName"
          $headers = @{
            "Authorization" = "token ${{ secrets.CENTRAL_REPO_TOKEN }}"
            "Accept" = "application/vnd.github.v3+json"
          }
          $prBody = @{
            title = "chore: register $modelName"
            head  = $branch
            base  = "main"
            body  = "Automated model registration"
          }
          $pr = Invoke-RestMethod -Uri "https://api.github.com/repos/Stewie-pixel/AI-project-collection/pulls" `
            -Method POST `
            -Headers $headers `
            -Body ($prBody | ConvertTo-Json) `
            -ContentType "application/json"
          Write-Host "PR #$($pr.number) created"
          $mergeBody = @{ merge_method = "squash" }
          Invoke-RestMethod -Uri "https://api.github.com/repos/Stewie-pixel/AI-project-collection/pulls/$($pr.number)/merge" `
            -Method PUT `
            -Headers $headers `
            -Body ($mergeBody | ConvertTo-Json) `
            -ContentType "application/json"
          Write-Host "PR #$($pr.number) merged"
        shell: powershell
